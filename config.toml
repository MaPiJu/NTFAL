# Elder Triple Screen Scanner — configuration
# Nothing in this file is a secret; secrets (if ever needed) belong in .env.

[scanner]
# Watchlist entries:
#   - explicit coins, e.g. "BTC", "ETH", or tradfi perps like "xyz:GOLD"
#   - "*"      = EVERY tradable native (crypto) Hyperliquid perp
#   - "xyz:*"  = every tradable perp of the HIP-3 "xyz" dex — the tradfi
#                universe (stocks, indices, gold, oil, forex…)
# Scanning full universes means two requests per asset, so the refresh takes
# a few minutes and the dashboard gets one card per perp.
watchlist = ["*", "xyz:*"]
weekly_interval = "1w"
daily_interval = "1d"
# Optional true third screen for lower-timeframe entry timing. Disabled by
# default: when enabled, the scanner fetches 4h bars and uses their latest
# completed high/low plus Impulse color to time the stop-entry.
use_third_screen = false
third_screen_interval = "4h"
# History depth (bars) to keep cached. The API serves at most 5000 candles.
lookback_weeks = 260
lookback_days = 500
lookback_third_screen = 300

[strategy]
# Strategy thresholds/weights. Defaults mirror the Elder scanner's built-in
# behavior; tune here instead of editing code.
flat_trend_slope_pct = 0.001
penetration_lookback_days = 35
# Elder's 2nd-screen caveat (p.158): skip the daily Force Index buy/short signal
# when FI(2) prints a NEW multi-week low (longs) / high (shorts) — the move is
# accelerating, not a pullback. Lookback in daily bars (~3-4 weeks).
force_index_extreme_lookback_days = 25
channel_lookback_weeks = 26
min_reward_risk = 2.0
divergence_lookback = 60
rr_excellent = 3.0
strong_weekly_slope = 0.03
fi_scale_lookback = 20
# Require the latest completed daily close to be in/near the daily EMA13-EMA26
# value zone before a new entry is actionable. 0.03 = max 3% beyond the zone.
value_zone_max_distance_pct = 0.03
# Elder SafeZone-style stops: average adverse daily noise over the lookback,
# multiplied by the factor, behind the recent daily extreme.
safezone_lookback_days = 20
safezone_factor = 2.0
# The theoretical stop-entry is valid only for this many completed daily bars;
# if still unfilled it should be rolled to the latest high/low while conditions hold.
entry_order_expire_days = 2
score_reward_risk_weight = 0.40
score_impulse_weight = 0.25
score_tide_weight = 0.20
score_pullback_weight = 0.15

[risk]
# Account equity in USD (used by the 2% Iron Triangle sizing).
equity = 10000.0
# Risk per trade as a fraction of equity. Default 1%, HARD CAP 2% — values
# above 0.02 are clamped, never silently exceeded.
risk_pct = 0.01
# 6% Rule bookkeeping:
#   equity_at_month_start: equity on the 1st of the current month
#   month_realized_losses: realized losses so far this month (positive number)
#   open_trade_risk:       optional manual extra risk for trades not visible from
#                          the configured Hyperliquid address. Visible positions
#                          are now risked automatically from the Elder stop.
equity_at_month_start = 10000.0
month_realized_losses = 0.0
open_trade_risk = 0.0

[positions]
# Public wallet address (0x…) used to READ your open Hyperliquid positions via
# the public `clearinghouseState` info endpoint, so the tool can apply Elder's
# exit analysis (hold / take profits / exit) to trades you already hold.
# This is READ-ONLY: a public address only, never a private key — nothing is
# signed and no order is ever placed. Leave empty to disable trade management.
# May also be set via the HL_ADDRESS environment variable (see .env.example).
address = ""

[journal]
# Append one compact JSONL entry per `run.py` refresh: top pick, actionable
# signals, open-position verdicts, stops, risks and reasons.
enabled = true
path = "cache/trading_journal.jsonl"

[cache]
dir = "cache"
